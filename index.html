<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samokat Nazorat Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f9);
            color: var(--tg-theme-text-color, #333333);
            margin: 0; padding: 16px; box-sizing: border-box;
        }
        h3 { text-align: center; color: var(--tg-theme-button-color, #2481cc); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        select, input[type="text"], input[type="tel"] {
            width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px;
            box-sizing: border-box; font-size: 15px; background-color: #fafafa;
        }
        .grid-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .grid-buttons.errors { grid-template-columns: repeat(3, 1fr); }
        .btn-select {
            padding: 9px; background-color: #f0f0f0; border: 1px solid #ddd;
            border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500;
        }
        .btn-select.active {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        .footer-btn {
            margin-top: 20px; width: 100%; padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .success-msg {
            display: none; background-color: #d4edda; color: #155724;
            padding: 12px; border-radius: 8px; text-align: center;
            margin-bottom: 15px; font-weight: bold; font-size: 14px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <h3>🛴 Samokat Nazorat Formasi</h3>
    
    <div class="success-msg" id="success_block">
        ✅ Ma'lumot botga yuborildi!<br>🔄 Navbatdagi samokat raqamini kiritishingiz mumkin.
    </div>
    
    <div class="form-group">
        <label for="mexanik_name">Ismingizni tanlang:</label>
        <select id="mexanik_name">
            <option value="">-- Tanlang --</option>
            <option value="Umid">Umid</option>
            <option value="Shahobiddin">Shahobiddin</option>
            <option value="Rustam">Rustam</option>
        </select>
    </div>

    <div class="form-group">
        <label for="mexanik_phone">Telefon raqamingiz (Tekshirish uchun):</label>
        <input type="tel" id="mexanik_phone" placeholder="Masalan: +998972230237">
    </div>

    <div class="form-group">
        <label for="samokat_num">Samokat raqamini kiriting:</label>
        <input type="text" id="samokat_num" placeholder="Masalan: 1024" inputmode="numeric">
    </div>

    <div class="form-group">
        <label>Qism nomini tanlang:</label>
        <div class="grid-buttons" id="parts_container"></div>
    </div>

    <div class="form-group">
        <label>Xatolik kodini tanlang:</label>
        <div class="grid-buttons errors" id="errors_container"></div>
    </div>

    <div class="form-group">
        <label>Mexanik izohini tanlang:</label>
        <div class="grid-buttons" id="comments_container"></div>
    </div>

    <button class="footer-btn" onclick="submitForm()">💾 Saqlash va Yuborish</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const PARTS = ["Dashbord", "Kontroller", "IoT", "Motor kaleso", "Tormoz", "Gaz pedal", "Batareyka", "Asosiy sim"];
        const ERRORS = ["10", "11", "12", "13", "14", "15", "16", "18", "19", "21", "22", "23", "24", "26", "27", "31", "32", "35", "37", "39", "40", "41", "50", "51", "52", "54", "55", "57", "58", "Geo", "Harbit", "Xatolik yo'q"];
        const COMMENTS = ["Yonmayapti", "O'chib qolgan", "Ishlamayapti", "Singan", "Boshqa"];

        let selectedPart = "";
        let selectedError = "";
        let selectedComment = "";

        function initGrid(containerId, items, isError=false) {
            const container = document.getElementById(containerId);
            items.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'btn-select';
                btn.innerText = isError && !isNaN(item) ? item + " xatolik" : item;
                btn.onclick = function() {
                    container.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if(containerId === 'parts_container') selectedPart = item;
                    if(containerId === 'errors_container') selectedError = isError && !isNaN(item) ? item + " xatolik" : item;
                    if(containerId === 'comments_container') selectedComment = item;
                };
                container.appendChild(btn);
            });
        }

        initGrid('parts_container', PARTS);
        initGrid('errors_container', ERRORS, true);
        initGrid('comments_container', COMMENTS);

        function submitForm() {
            const name = document.getElementById('mexanik_name').value;
            let phone = document.getElementById('mexanik_phone').value.trim().replace(/\s+/g, '');
            const samokatInput = document.getElementById('samokat_num');
            const samokatNum = samokatInput.value.trim();

            if (!name) { alert("Iltimos, ismingizni tanlang!"); return; }
            if (!phone) { alert("Iltimos, telefon raqamingizni kiriting!"); return; }
            if (!samokatNum) { alert("Iltimos, samokat raqamini kiriting!"); return; }
            if (!selectedPart) { alert("Iltimos, qism nomini tanlang!"); return; }
            if (!selectedError) { alert("Iltimos, xatolik kodini tanlang!"); return; }
            if (!selectedComment) { alert("Iltimos, izohni tanlang!"); return; }

            if (!phone.startsWith('+')) {
                phone = '+' + phone;
            }

            const resultData = {
                ism: name,
                tel: phone,
                samokat_num: samokatNum,
                qism: selectedPart,
                xatolik: selectedError,
                izoh: selectedComment
            };

            // Botga ma'lumot yuboriladi (Oyna yopilmaydi!)
            tg.sendData(JSON.stringify(resultData));

            // Ekranda yashil xabarni ko'rsatish
            const successBlock = document.getElementById('success_block');
            successBlock.style.display = 'block';
            
            // Faqat kiritilgan samokat ma'lumotlarini tozalaymiz (Ism va Tel qoladi, har safar tanlamaslik uchun)
            samokatInput.value = "";
            selectedPart = "";
            selectedError = "";
            selectedComment = "";
            
            // Tugmalardagi faollik ("active" klassi) ranglarini o'chiramiz
            document.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
            
            // Sahifani tepaga ko'tarib qo'yamiz (Yashil xabarni ko'rishi uchun)
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            // Yashil xabarni 5 soniyadan keyin g'oyib qilish
            setTimeout(() => {
                successBlock.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
